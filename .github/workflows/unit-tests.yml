name: Unit Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - core
          - notify-core
          - notify-client
          - notify-publisher
          - platform-browser
          - adapter-viem
          - adapter-ethers
          - builder
          - builder-client
          - platform-node
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup Rust
        if: matrix.package == 'builder'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate

      - name: Restore Yarn cache
        uses: actions/cache@v5
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}

      - name: Install
        run: yarn install --immutable

      - name: Run tests (${{ matrix.package }})
        run: yarn test packages/${{ matrix.package }}/tests
