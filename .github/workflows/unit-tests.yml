name: Unit Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - core
          - platform-browser
          - adapter-viem
          - adapter-ethers
          - builder-client
          - platform-node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}

      - name: Install
        run: yarn install --immutable

      - name: Run tests (${{ matrix.package }})
        run: yarn test packages/${{ matrix.package }}/tests
